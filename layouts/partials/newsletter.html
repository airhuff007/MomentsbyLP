{{/* Newsletter signup — connect action to ConvertKit / Mailchimp / Klaviyo */}}
<section class="newsletter-section" aria-labelledby="newsletter-heading">
  <h2 id="newsletter-heading">Join the South Florida Photo List</h2>
  <p>Mini session dates. Local guides. Creative events. Photography inspiration. Early booking access.</p>
  <form
    class="newsletter-form"
    action="#"
    method="post"
    aria-label="Email newsletter signup"
  >
    <label for="newsletter-email" class="visually-hidden">Your email address</label>
    <input
      type="email"
      id="newsletter-email"
      name="email"
      placeholder="Your email address"
      required
      autocomplete="email"
    />
    <button type="submit">Join the List</button>
  </form>
  <p class="newsletter-note"><small>No spam. Unsubscribe anytime.</small></p>
</section>
